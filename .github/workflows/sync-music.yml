name: Sync music data

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily (~03:00 ART)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_ARTIST_ID: ${{ vars.SPOTIFY_ARTIST_ID }}
        run: node scripts/sync-music.js

      - name: Commit if changed
        run: |
          git config user.name "manupavez-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/music.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(data): sync music"
            git push
          fi
