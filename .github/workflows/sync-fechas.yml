name: Sync fechas (eventos.json)

on:
  schedule:
    - cron: "30 6 * * *" # 06:30 UTC daily (~03:30 ART)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate eventos.json from Google Sheet
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
        run: python automation.py json

      - name: Commit if changed
        run: |
          git config user.name "manupavez-bot"
          git config user.email "bot@users.noreply.github.com"
          git add eventos.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(data): sync fechas"
            git push
          fi
